<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f8fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2d6cdf;
            --accent-dark: #1f4fb3;
            --border: #e5e7eb;
            --danger: #d64045;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .site-header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 18px 0;
        }

        .site-title {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 20px;
            font-size: 1.35rem;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .container {
            max-width: 860px;
            margin: 28px auto;
            padding: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        h1, h2 {
            margin: 0 0 12px;
            line-height: 1.25;
        }

        h1 {
            font-size: 1.6rem;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--muted);
        }

        p {
            margin: 0 0 14px;
            color: var(--text);
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-dark);
        }

        .button,
        button {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: var(--accent);
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
        }

        .button:hover,
        button:hover {
            background: var(--accent-dark);
            box-shadow: 0 6px 14px rgba(31, 79, 179, 0.2);
            transform: translateY(-1px);
        }

        .button.secondary {
            background: transparent;
            color: var(--accent);
            border-color: var(--accent);
        }

        .button.secondary:hover {
            background: rgba(45, 108, 223, 0.08);
        }

        .button.danger {
            background: var(--danger);
        }

        .button.danger:hover {
            background: #b73539;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .table th,
        .table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }

        .table thead th {
            background: #f3f5f9;
            font-weight: 600;
        }

        .actions a {
            margin-right: 8px;
            font-weight: 600;
        }

        form {
            display: grid;
            gap: 12px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font: inherit;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .muted {
            color: var(--muted);
        }

        @media (max-width: 720px) {
            .container {
                margin: 20px 16px;
                padding: 20px;
            }

            .site-title {
                padding: 0 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<header class="site-header">
    <h1 class="site-title">{{name|upper}}</h1>
</header>

{% block content %}
{% endblock %}

</body>
</html>
