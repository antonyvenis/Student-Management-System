{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>{{ page_title }}</h1>
    <p>Are you sure you want to delete "{{ object.name }}"?</p>

    <form method="post">
        {% csrf_token %}
        <div class="form_actions">
            <button class="button danger" type="submit">Yes,Delete</button>
            <a class="button secondary" href="{% url 'item_list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
