{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>{{ page_title }}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit">Save</button>
            <a href="{% url 'item_list' %}" class="button secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
